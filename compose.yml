# compose.yml — base definition for all environments.
# Use with:
#   dev : docker compose -f compose.yml -f compose.dev.yml --profile local-db up
#   prod: docker compose -f compose.yml -f compose.prod.yml up -d

name: pfe-marketing

services:
  backend:
    build:
      context: ./backend
    image: pfe/backend:latest
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 5000
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      MONGODB_URI: ${MONGODB_URI}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-24h}
      SCRAPER_URL: http://scraper:8000
      N8N_WEBHOOK_URL: http://n8n:5678
      N8N_WEBHOOK_SECRET: ${N8N_WEBHOOK_SECRET}
      GROQ_API_KEY: ${GROQ_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      VALUESERP_API_KEY: ${VALUESERP_API_KEY}
      SERPER_API_KEY: ${SERPER_API_KEY}
      TAVILY_API_KEY: ${TAVILY_API_KEY}
      CHROMA_API_KEY: ${CHROMA_API_KEY}
      CHROMA_TENANT: ${CHROMA_TENANT}
      CHROMA_DATABASE: ${CHROMA_DATABASE}
      APIFY_API_KEY: ${APIFY_API_KEY}
      FB_COOKIE_C_USER: ${FB_COOKIE_C_USER}
      FB_COOKIE_XS: ${FB_COOKIE_XS}
      FB_APP_ID: ${FB_APP_ID}
      FB_APP_SECRET: ${FB_APP_SECRET}
    depends_on:
      scraper:
        condition: service_started
    networks: [pfe_net]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
        VITE_WS_URL: ${VITE_WS_URL:-/}
    image: pfe/frontend:latest
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks: [pfe_net]

  scraper:
    build:
      context: ./backend/scraper
    image: pfe/scraper:latest
    environment:
      SCRAPER_USE_BROWSER: ${SCRAPER_USE_BROWSER:-false}
      SCRAPER_HOST: 0.0.0.0
      SCRAPER_PORT: 8000
    networks: [pfe_net]

  n8n:
    image: n8nio/n8n:latest
    environment:
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER:-admin}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD:-change_me}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      N8N_HOST: ${N8N_HOST:-localhost}
      N8N_PORT: 5678
      N8N_PROTOCOL: ${N8N_PROTOCOL:-http}
      WEBHOOK_URL: ${WEBHOOK_URL:-http://localhost:5678/}
      GENERIC_TIMEZONE: ${TZ:-Africa/Tunis}
    volumes:
      - n8n_data:/home/node/.n8n
      - ./infra/n8n/workflows:/workflows:ro
    networks: [pfe_net]

  # Local dev database — enable with: --profile local-db
  mongo:
    image: mongo:7
    profiles: [local-db]
    volumes:
      - mongo_data:/data/db
      - ./infra/mongo/init.js:/docker-entrypoint-initdb.d/init.js:ro
    networks: [pfe_net]

  # Optional — enable with: --profile with-redis
  redis:
    image: redis:7-alpine
    profiles: [with-redis]
    volumes:
      - redis_data:/data
    networks: [pfe_net]

networks:
  pfe_net:
    driver: bridge

volumes:
  mongo_data:
  n8n_data:
  redis_data:
